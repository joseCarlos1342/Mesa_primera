name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - name: Lint web
        run: npm run lint --workspace=web

  # ── Type Check ──────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - name: Typecheck web
        run: npx tsc --noEmit -p apps/web/tsconfig.json
      - name: Typecheck game-server
        run: npx tsc --noEmit -p apps/game-server/tsconfig.json

  # ── Unit Tests: Web (Jest 30) ───────────────────────────
  test-web:
    name: Tests Web (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - name: Run Jest tests with coverage
        run: npm run test:coverage --workspace=web -- --ci --forceExit

  # ── Unit Tests: Game Server (Vitest 4) ──────────────────
  test-game-server:
    name: Tests Game Server (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - name: Run Vitest tests with coverage
        run: npm run test:coverage --workspace=game-server

  # ── Build (solo si todos los checks pasan) ─────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-web, test-game-server]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - name: Build web
        run: npm run build --workspace=web
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
          NEXT_PUBLIC_GAME_SERVER_URL: http://localhost:2567
          NEXT_PUBLIC_SOCKET_URL: http://localhost:2567
